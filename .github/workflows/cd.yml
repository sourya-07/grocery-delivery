# CD Pipeline — Build, Push to Docker Hub & Deploy
# Triggers: push to main only (after CI passes)
name: CD

on:
  push:
    branches: [main]

# Cancel any in-progress deploy when a newer push arrives
concurrency:
  group: cd-production
  cancel-in-progress: true

env:
  SERVER_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/grocery-delivery-server
  CLIENT_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/grocery-delivery-client

jobs:
  # Build & Push Images
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ steps.sha.outputs.tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Always use git short SHA as the canonical image tag
      - name: Compute image tag (git short SHA)
        id: sha
        run: echo "tag=sha-$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      # Generate OCI labels and extra tags (semver, branch, latest)
      - name: Docker metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.SERVER_IMAGE }}
            ${{ env.CLIENT_IMAGE }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Set up QEMU (multi-arch support)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Build & push server
      - name: Build and push server image
        uses: docker/build-push-action@v5
        with:
          context: ./server
          file: ./server/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.SERVER_IMAGE }}:${{ steps.sha.outputs.tag }}
            ${{ env.SERVER_IMAGE }}:latest
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Build & push client
      - name: Build and push client image
        uses: docker/build-push-action@v5
        with:
          context: ./client
          file: ./client/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.CLIENT_IMAGE }}:${{ steps.sha.outputs.tag }}
            ${{ env.CLIENT_IMAGE }}:latest
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Deploy to VPS / Cloud Server
  deploy:
    name: Deploy to Production Server
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key:      ${{ secrets.SSH_PRIVATE_KEY }}
          port:     ${{ secrets.SSH_PORT || 22 }}
          script: |
            set -e

            # pull latest compose file 
            cd ~/grocery-delivery

            #  Ensure we have the latest compose file
            git pull origin main

            #  set runtime env vars 
            export DOCKERHUB_USERNAME="${{ secrets.DOCKERHUB_USERNAME }}"
            export IMAGE_TAG="${{ needs.build-and-push.outputs.image_tag }}"
            export MONGODB_URI="${{ secrets.MONGODB_URI }}"
            export JWT_SECRET="${{ secrets.JWT_SECRET }}"

            #  pull new images 
            docker compose -f docker-compose.prod.yml pull

            # rolling restart (zero-downtime)
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            #  prune dangling images to free disk space 
            docker image prune -f

            echo "Deployed $IMAGE_TAG to production"

  # Post-deploy health check 
  health-check:
    name: Post-Deploy Health Check
    runs-on: ubuntu-latest
    needs: deploy

    steps:
      - name: Wait for containers to stabilise
        run: sleep 20

      - name: Check /api/health endpoint
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            https://${{ secrets.PRODUCTION_HOST }}/api/health)
          if [ "$STATUS" != "200" ]; then
            echo "❌ Health check failed — HTTP $STATUS"
            exit 1
          fi
          echo "✅ Health check passed — HTTP $STATUS"
