
# CI Pipeline — Lint, Type-check & Build
# Triggers: every push and pull request to main / develop
name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # Server: type-check + build
  server-ci:
    name: Server — Lint & Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: server

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type-check
        run: npx tsc --noEmit

      - name: Build (compile TypeScript)
        run: npm run build

      - name: Upload server dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: server-dist
          path: server/dist/
          retention-days: 1

  # Client: lint + build 
  client-ci:
    name: Client — Lint & Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: client

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build (Vite production bundle)
        run: npm run build

      - name: Upload client dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: client-dist
          path: client/dist/
          retention-days: 1

  # Docker build smoke-test 
  docker-smoke-test:
    name: Docker — Build Images
    runs-on: ubuntu-latest
    needs: [server-ci, client-ci]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build server image (no push)
        uses: docker/build-push-action@v5
        with:
          context: ./server
          file: ./server/Dockerfile
          push: false
          tags: grocery-delivery-server:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build client image (no push)
        uses: docker/build-push-action@v5
        with:
          context: ./client
          file: ./client/Dockerfile
          push: false
          tags: grocery-delivery-client:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
