#  Local Development 
# Usage: docker compose up --build
# 

services:
  #  MongoDB (local) 
  mongo:
    image: mongo:7
    container_name: grocery_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: grocery-delivery
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 5

  #  Backend (Express + TypeScript) 
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
      target: production
    container_name: grocery_server
    restart: unless-stopped
    ports:
      - "4000:4000"
    env_file:
      - ./server/.env
    environment:
      NODE_ENV: development
      # Override URI to use the local mongo service instead of Atlas
      MONGODB_URI: mongodb://mongo:27017/grocery-delivery
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  #  Frontend (React + Vite → Nginx) 
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      target: production
    container_name: grocery_client
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      server:
        condition: service_healthy

volumes:
  mongo_data:
  uploads_data:
